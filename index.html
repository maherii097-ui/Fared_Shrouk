<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Wedding Invitation</title>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;600;800&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">

<style>
* {
  margin:0;
  padding:0;
  box-sizing:border-box;
  scroll-behavior:smooth;
}

body {
  font-family:'Cairo', sans-serif;
  color:white;
}

/* الصفحة الأولى */
.hero {
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  position:relative;
  overflow:hidden;
}

/* الخلفية Black & Gold */
.hero::before {
  content:"";
  position:absolute;
  inset:0;

  background:
    radial-gradient(circle at 20% 20%, rgba(255,215,0,0.25), transparent 40%),
    radial-gradient(circle at 80% 30%, rgba(255,215,0,0.10), transparent 45%),
    radial-gradient(circle at 50% 100%, #1a1a1a, #000000 70%);

  z-index:-2;
}

/* Glow */
.hero::after {
  content:"";
  position:absolute;
  inset:0;

  background:
    radial-gradient(circle at top, rgba(255,215,0,0.30), transparent 55%),
    radial-gradient(circle at bottom, rgba(255,215,0,0.10), transparent 60%),
    linear-gradient(to bottom, rgba(0,0,0,0.2), rgba(0,0,0,0.6));

  z-index:-1;
}

/* الكارت */
.card {
  background:rgba(0,0,0,0.55);
  padding:40px;
  border-radius:30px;
  text-align:center;
  backdrop-filter:blur(10px);
  width:90%;
  max-width:500px;
  z-index:2;
}

.names {
  font-family:'Playfair Display', serif;
  font-size:36px;
  color:gold;
  margin-bottom:10px;
}

.welcome {
  font-size:18px;
  margin-bottom:20px;
  color:#eee;
}

.countdown {
  display:flex;
  justify-content:space-between;
  margin-top:20px;
}

.box {
  width:23%;
  background:rgba(255,255,255,0.1);
  padding:10px;
  border-radius:10px;
}

.box span {
  font-size:20px;
  font-weight:bold;
}

/* 👇 Scroll Down */
.scroll-down {
  position:absolute;
  bottom:25px;
  left:50%;
  transform:translateX(-50%);

  font-size:14px;
  color:rgba(255,215,0,0.9);
  letter-spacing:2px;

  animation:bounce 1.5s infinite;
}

@keyframes bounce {
  0%,100% { transform:translateX(-50%) translateY(0); }
  50% { transform:translateX(-50%) translateY(-10px); }
}

/* الصفحة التانية */
.details {
  min-height:100vh;
  background:linear-gradient(135deg,#0f0f0f,#1c1c1c,#0f0f0f);
  display:flex;
  justify-content:center;
  align-items:center;
  padding:40px;
  position:relative;
}

.details-box {
  width:90%;
  max-width:600px;
  text-align:center;
}

.title {
  font-size:30px;
  color:gold;
  margin-bottom:25px;
  font-family:'Playfair Display', serif;
}

.event-card {
  margin:12px 0;
  padding:18px;
  border-radius:18px;
  font-size:18px;
  background:rgba(255,255,255,0.06);
  border:1px solid rgba(255,215,0,0.2);
  backdrop-filter:blur(8px);
  transition:0.3s;
}

.event-card:hover {
  transform:scale(1.03);
  border-color:gold;
}

.location-btn {
  display:inline-block;
  margin-top:20px;
  padding:12px 25px;
  border-radius:30px;
  background:gold;
  color:black;
  font-weight:bold;
  text-decoration:none;
}

/* اللوجو */
.maher-logo {
  position:absolute;
  top:20px;
  left:20px;

  width:110px;
  height:110px;

  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;

  border-radius:50%;
  background:radial-gradient(circle at top, rgba(255,215,0,0.25), rgba(0,0,0,0.6));
  border:2px solid rgba(255,215,0,0.6);
  box-shadow:0 0 25px rgba(255,215,0,0.35);

  color:gold;
  font-family:'Playfair Display', serif;
  text-align:center;

  z-index:10;
}

/* موبايل */
@media (max-width:768px){

  .card{
    width:92%;
    padding:20px;
  }

  .names{
    font-size:28px;
  }

  .countdown{
    flex-wrap:wrap;
    gap:10px;
  }

  .box{
    width:48%;
  }
}
</style>
</head>

<body>

<section class="hero">

  <div class="maher-logo">
    <span>ENG</span>
    <b>MAHER</b>
  </div>

  <div class="card">
    <div class="names">Fared & Shrouk</div>
    <div class="welcome">يسرنا دعوتكم لحضور حفل زفافنا</div>

    <div class="countdown">
      <div class="box"><span id="days">0</span><br>يوم</div>
      <div class="box"><span id="hours">0</span><br>ساعة</div>
      <div class="box"><span id="minutes">0</span><br>دقيقة</div>
      <div class="box"><span id="seconds">0</span><br>ثانية</div>
    </div>
  </div>

  <!-- 👇 زر النزول -->
  <div class="scroll-down">
    ⬇ Scroll Down
  </div>

</section>

<section class="details">

  <div class="details-box">

    <div class="title">✨فرحتنا تكمل بحضوركم يوم</div>

    <div class="event-card">🌿 ليلة الحنة<br>24 / 6 / 2026</div>
    <div class="event-card">🍽️ مائدة الغداء<br>28 / 6 / 2026</div>
    <div class="event-card">💍 حفل الزفاف<br>29 / 6 / 2026</div>
    <div class="event-card">📍 G Marriott Hall - Talkha</div>

    <a class="location-btn"
       href="https://www.google.com/maps/search/?api=1&query=G+Marriott+Hall+Talkha"
       target="_blank">
      📌 View Location
    </a>

  </div>

</section>

<script>
const weddingDate = new Date(2026, 5, 29, 20, 0, 0).getTime();

setInterval(() => {
  const now = new Date().getTime();
  let diff = weddingDate - now;

  if (diff < 0) diff = 0;

  document.getElementById("days").innerText = Math.floor(diff / (1000 * 60 * 60 * 24));
  document.getElementById("hours").innerText = Math.floor((diff / (1000 * 60 * 60)) % 24);
  document.getElementById("minutes").innerText = Math.floor((diff / (1000 * 60)) % 60);
  document.getElementById("seconds").innerText = Math.floor((diff / 1000) % 60);

}, 1000);
</script>

</body>
</html>
