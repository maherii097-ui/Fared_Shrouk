<script>
const weddingDate = new Date("2026-06-29T00:00:00").getTime();

function updateCountdown() {
  const now = new Date().getTime();
  const diff = weddingDate - now;

  if (diff <= 0) return;

  const days = Math.floor(diff / (1000 * 60 * 60 * 24));
  const hours = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
  const minutes = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
  const seconds = Math.floor((diff % (1000 * 60)) / 1000);

  document.getElementById("days").innerText = days;
  document.getElementById("hours").innerText = hours;
  document.getElementById("minutes").innerText = minutes;
  document.getElementById("seconds").innerText = seconds;
}

function addComment(){
  let name=document.getElementById("name").value;
  let msg=document.getElementById("msg").value;

  if(!name || !msg) return;

  db.ref("comments").push({
    name:name,
    msg:msg
  });

  document.getElementById("name").value="";
  document.getElementById("msg").value="";
}

db.ref("comments").on("child_added", function(snapshot){
  let data = snapshot.val();
  let div = document.createElement("div");
  div.innerHTML = "<b style='color:gold'>" + data.name + "</b><br>" + data.msg;
  document.getElementById("commentsBox").appendChild(div);
});

function handleScrollAnimation(){
  document.querySelectorAll('.fade-up').forEach(el => {
    if(el.getBoundingClientRect().top < window.innerHeight - 100){
      el.classList.add('show');
    }
  });
}

window.addEventListener('scroll', handleScrollAnimation);
window.addEventListener('load', handleScrollAnimation);

window.toggleMusic = function(){
  const bgMusic = document.getElementById("bgMusic");
  const btn = document.getElementById("music-btn");

  if(bgMusic.paused){
    bgMusic.volume = 0.3;
    bgMusic.play();
    btn.innerHTML = "🔊";
  } else {
    bgMusic.pause();
    btn.innerHTML = "🔇";
  }
};

const startScreen = document.getElementById("startScreen");
const introVideo = document.getElementById("introVideo");
const introContainer = document.getElementById("introContainer");
const bgMusic = document.getElementById("bgMusic");

function skipIntro(){
  const skipBtn = document.getElementById("skipBtn");
  skipBtn.style.display = "none";
  introContainer.style.display = "none";
  introVideo.style.display = "none";
  introVideo.pause();
  introVideo.currentTime = 0;
  bgMusic.volume = 0.5;
  bgMusic.play().catch(err => console.log("Audio play error:", err));
  document.getElementById("music-btn").innerHTML = "🔊";
}

startScreen.addEventListener("click", async () => {
  startScreen.style.display = "none";
  introContainer.style.display = "flex";
  document.getElementById("loadingSpinner").style.display = "block";
  document.getElementById("skipBtn").style.display = "block";
  
  // إعطاء وقت قصير لتحميل الفيديو
  setTimeout(() => {
    introVideo.style.display = "block";
    document.getElementById("loadingSpinner").style.display = "none";
    
    // تشغيل الفيديو مع الصوت
    introVideo.volume = 0.8;
    const playPromise = introVideo.play();
    if (playPromise !== undefined) {
      playPromise.catch(error => {
        console.log("Play error:", error);
        // إذا فشل التشغيل التلقائي، انتقل للشاشة الرئيسية
        skipIntro();
      });
    }
  }, 500);
});

introVideo.addEventListener("ended", () => {
  document.getElementById("skipBtn").style.display = "none";
  introContainer.style.display = "none";
  introVideo.style.display = "none";
  bgMusic.volume = 0.5;
  bgMusic.play().catch(err => console.log("Audio play error:", err));
  document.getElementById("music-btn").innerHTML = "🔊";
});

document.getElementById("skipBtn").addEventListener("click", skipIntro);

document.body.style.overflow = "auto";

updateCountdown();
setInterval(updateCountdown, 1000);

function openImg(img){
  document.getElementById("lightbox").style.display = "flex";
  document.getElementById("lightbox-img").src = img.src;
}
