<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Wedding Invitation</title>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;600;800&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">

<style>
* {
  margin:0;
  padding:0;
  box-sizing:border-box;
  scroll-behavior:smooth;
}

body {
  font-family:'Cairo', sans-serif;
  color:white;
}

/* الصفحة الأولى */
.hero {
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  position:relative;
}

.hero::before {
  content:"";
  position:absolute;
  width:100%;
  height:100%;
  background:url("https://images.unsplash.com/photo-1519741497674-611481863552") center/cover no-repeat;
  filter:brightness(0.6);
  z-index:-2;
}

.hero::after {
  content:"";
  position:absolute;
  width:300px;
  height:300px;
  top:10%;
  left:50%;
  transform:translateX(-50%);
  background:radial-gradient(circle, rgba(255,200,0,0.6), transparent);
  z-index:-1;
}

.card {
  background:rgba(0,0,0,0.55);
  padding:40px;
  border-radius:30px;
  text-align:center;
  backdrop-filter:blur(10px);
  width:90%;
  max-width:500px;
}

.names {
  font-family:'Playfair Display', serif;
  font-size:36px;
  color:gold;
  margin-bottom:10px;
}

.welcome {
  font-size:18px;
  margin-bottom:20px;
  color:#eee;
}

.countdown {
  display:flex;
  justify-content:space-between;
  margin-top:20px;
}

.box {
  width:23%;
  background:rgba(255,255,255,0.1);
  padding:10px;
  border-radius:10px;
}

.box span {
  font-size:20px;
  font-weight:bold;
}

/* الصفحة التانية */
.details {
  min-height:100vh;
  background:linear-gradient(135deg,#0f0f0f,#1c1c1c,#0f0f0f);
  display:flex;
  justify-content:center;
  align-items:center;
  padding:40px;
  position:relative;
}

.details-box {
  width:90%;
  max-width:600px;
  text-align:center;
}

.title {
  font-size:30px;
  color:gold;
  margin-bottom:25px;
  font-family:'Playfair Display', serif;
}

.event-card {
  margin:12px 0;
  padding:18px;
  border-radius:18px;
  font-size:18px;
  background:rgba(255,255,255,0.06);
  border:1px solid rgba(255,215,0,0.2);
  backdrop-filter:blur(8px);
  transition:0.3s;
}

.event-card:hover {
  transform:scale(1.03);
  border-color:gold;
}

.henna {box-shadow:0 0 20px rgba(0,255,120,0.1);}
.lunch {box-shadow:0 0 20px rgba(255,200,0,0.1);}
.wedding {box-shadow:0 0 20px rgba(255,0,120,0.1);}
.place {box-shadow:0 0 20px rgba(0,150,255,0.1);}

.location-btn {
  display:inline-block;
  margin-top:20px;
  padding:12px 25px;
  border-radius:30px;
  background:gold;
  color:black;
  font-weight:bold;
  text-decoration:none;
}

/* 🔥 اللوجو الجديد (Badge احترافي) */
.maher-logo {
  position:absolute;
  top:20px;
  left:20px;

  width:110px;
  height:110px;

  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;

  border-radius:50%;
  background:radial-gradient(circle at top, rgba(255,215,0,0.25), rgba(0,0,0,0.6));
  border:2px solid rgba(255,215,0,0.6);
  box-shadow:0 0 25px rgba(255,215,0,0.35);

  color:gold;
  font-family:'Playfair Display', serif;
  text-align:center;

  z-index:10;
  transition:0.3s;
}

.maher-logo span {
  font-size:12px;
  letter-spacing:3px;
  opacity:0.8;
}

.maher-logo b {
  font-size:16px;
  letter-spacing:2px;
}

.maher-logo:hover {
  transform:scale(1.1) rotate(3deg);
  box-shadow:0 0 40px rgba(255,215,0,0.6);
}

.footer {
  margin-top:10px;
  font-size:12px;
  color:#aaa;
}
</style>
</head>

<body>

<!-- الصفحة الأولى -->
<section class="hero">
  <div class="card">
    <div class="names">Fared & Shrouk</div>
    <div class="welcome">يسرنا دعوتكم لحضور حفل زفافنا</div>

    <div class="countdown">
      <div class="box"><span id="days">0</span><br>يوم</div>
      <div class="box"><span id="hours">0</span><br>ساعة</div>
      <div class="box"><span id="minutes">0</span><br>دقيقة</div>
      <div class="box"><span id="seconds">0</span><br>ثانية</div>
    </div>

    <div style="margin-top:15px;color:#ccc;font-size:14px;">
      اسحب للأسفل ⬇️
    </div>
  </div>
</section>

<!-- الصفحة التانية -->
<section class="details">

  <!-- 🔥 اللوجو الجديد -->
  <div class="maher-logo">
    <span>ENG</span>
    <b>MAHER</b>
  </div>

  <div class="details-box">

    <div class="title">✨فرحتنا تكمل بحضوركم يوم 
    <div class="event-card henna">🌿 ليلة الحنة<br>24 / 6 / 2026</div>
    <div class="event-card lunch">🍽️ مائدة الغداء<br>28 / 6 / 2026</div>
    <div class="event-card wedding">💍 حفل الزفاف<br>29 / 6 / 2026</div>
    <div class="event-card place">📍 G Marriott Hall - Talkha</div>

    <a class="location-btn"
       href="https://www.google.com/maps/search/?api=1&query=G+Marriott+Hall+Talkha"
       target="_blank">
      📌 View Location
    </a>

    <div class="footer">
      Created with Eng Maher

  </div>
</section>

<script>
const weddingDate = new Date(2026, 5, 29, 20, 0, 0).getTime();

setInterval(() => {
  const now = new Date().getTime();
  let diff = weddingDate - now;

  if (diff < 0) diff = 0;

  document.getElementById("days").innerText = Math.floor(diff / (1000 * 60 * 60 * 24));
  document.getElementById("hours").innerText = Math.floor((diff / (1000 * 60 * 60)) % 24);
  document.getElementById("minutes").innerText = Math.floor((diff / (1000 * 60)) % 60);
  document.getElementById("seconds").innerText = Math.floor((diff / 1000) % 60);

}, 1000);
</script>

</body>
</html>
